name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app, dmg, and pkg
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CD-image2-macOS
          path: |
            dist/CD-image2.app
            dist/CD-image2-macOS-app.zip
            dist/CD-image2-macOS.dmg
            dist/CD-image2-macOS.pkg
